<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060F0D" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <title>Chybí nám hráč · Padel Klatovy</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">

    <header class="app-header">
      <img src="assets/logo.png" alt="Padel Klatovy" />
      <div class="title">
        CHYBÍ NÁM HRÁČ
        <small>PADEL KLATOVY</small>
      </div>
    </header>

    <main class="app-main">

      <p class="intro">Vytvoř hru a pošli pozvánku do klubové WhatsApp skupiny — hotovo za 10 sekund.</p>

      <button class="btn btn-red big-create" id="btn-create">
        Vytvořit hru
      </button>

      <div class="section-title">
        Otevřené hry <span class="hint" id="match-count"></span>
      </div>

      <div id="matches-list"></div>

      <a class="bar-link" href="https://padelklatovy.github.io/padel-klatovy-bar/" target="_blank" rel="noopener">
        Klubový bar
      </a>

      <button class="reset-link" id="btn-reset">Vrátit ukázkové hry</button>
    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/dataService.supabase.js"></script>
  <script src="js/invite.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
